<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Documentos</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>

    <main class="container mt-5">


        <h1>Generador de Documentos</h1>


        <form action="/generate" method="post" class="mt-4 mb-5">
            <div class="accordion mb-4" id="datos-constantes-accordion">
                <div class="accordion-item">
                    <h2 class="accordion-header" id="heading-alumno">
                        <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapse-alumno" aria-expanded="true" aria-controls="collapse-alumno">
                            Datos del alumno
                        </button>
                    </h2>
                    <div id="collapse-alumno" class="accordion-collapse collapse show" aria-labelledby="heading-alumno">
                        <div class="accordion-body">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="alumno-nombre" class="form-label">Nombre</label>
                                    <input
                                    type="text"
                                    class="form-control" 
                                    id="alumno-nombre" 
                                    name="alumno_nombre" 
                                    placeholder="Juan" 
                                    required
                                    {% if alumno %} value="{{ alumno.nombre }}" {% endif %}>
                                </div>
                                <div class="col-md-6">
                                    <label for="alumno-apellidos" class="form-label">Apellidos</label>
                                    <input
                                    type="text"
                                    class="form-control"
                                    id="alumno-apellidos"
                                    name="alumno_apellidos"
                                    placeholder="Pérez García"
                                    required
                                    {% if alumno %} value="{{ alumno.apellidos }}" {% endif %}>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Curso académico</label>
                                    <div class="input-group">
                                        <input type="text" class="form-control" id="alumno-curso-inicio" name="alumno_curso_inicio" placeholder="2025" pattern="^\d{4}$" title="Año de inicio (4 dígitos)" inputmode="numeric" required
                                        {% if alumno %} value="{{ alumno.curso_academico.split('/')[0] }}" {% endif %}>
                                        <span class="input-group-text">/</span>
                                        <input type="text" class="form-control" id="alumno-curso-fin" name="alumno_curso_fin" placeholder="2026" pattern="^\d{4}$" title="Año de fin (4 dígitos)" inputmode="numeric" required
                                        {% if alumno %} value="{{ alumno.curso_academico.split('/')[1] }}" {% endif %}>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label for="alumno-email" class="form-label">Email</label>
                                    <input type="email" class="form-control" id="alumno-email" name="alumno_email" placeholder="alumno@correo.com" required
                                    {% if alumno %} value="{{ alumno.email }}" {% endif %}>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="accordion-item">
                    <h2 class="accordion-header" id="heading-centro">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapse-centro" aria-expanded="false" aria-controls="collapse-centro">
                            Datos del centro
                        </button>
                    </h2>
                    <div id="collapse-centro" class="accordion-collapse collapse" aria-labelledby="heading-centro">
                        <div class="accordion-body">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="centro-nombre" class="form-label">Nombre del centro</label>
                                    <input type="text" class="form-control" id="centro-nombre" name="centro_nombre" placeholder="IES Ejemplo" required {% if centro %} value="{{ centro.nombre }}" {% endif %}>
                                </div>
                                <div class="col-md-6">
                                    <label for="centro-nombre-tutor" class="form-label">Nombre del tutor</label>
                                    <input type="text" class="form-control" id="centro-nombre-tutor" name="centro_nombre_tutor" placeholder="María" required {% if centro %} value="{{ centro.nombre_tutor }}" {% endif %}>
                                </div>
                                <div class="col-md-6">
                                    <label for="centro-apellidos-tutor" class="form-label">Apellidos del tutor</label>
                                    <input type="text" class="form-control" id="centro-apellidos-tutor" name="centro_apellidos_tutor" placeholder="López Martínez" required {% if centro %} value="{{ centro.apellidos_tutor }}" {% endif %}>
                                </div>
                                <div class="col-md-6">
                                    <label for="tutor-email" class="form-label">Email</label>
                                    <input type="email" class="form-control" id="tutor-email" name="tutor_email" placeholder="tutor@correo.com" required {% if centro %} value="{{ centro.email_tutor }}" {% endif %}>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-12">
                        <button type="button" id="guardar-constantes" class="btn btn-primary">Guardar datos constantes</button>
                    </div>
                    <div class="col-12">
                        <p id="mensaje-exito" class="text-success mb-0"></p>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h2 class="h5 mb-0">Actividades</h2>
                    <button type="button" id="agregar-actividad" class="btn btn-outline-primary btn-sm">Añadir actividad</button>
                </div>
                <div class="card-body">
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label for="periodo_seguimiento_inicio" class="form-label">Periodo de seguimiento - fecha de comienzo</label>
                            <input type="date" class="form-control" id="periodo_seguimiento_inicio" name="periodo_seguimiento_inicio" required>
                        </div>
                        <div class="col-md-6">
                            <label for="periodo_seguimiento_fin" class="form-label">Periodo de seguimiento - fecha de fin</label>
                            <input type="date" class="form-control" id="periodo_seguimiento_fin" name="periodo_seguimiento_fin" required>
                        </div>
                    </div>
                    <div id="actividades-container" class="d-grid gap-3"></div>
                    <small class="text-muted">Máximo 8 actividades.</small>
                </div>
            </div>




            <button type="submit" class="btn btn-primary">Generar documento</button>
        </form>



    </main>
    <div class="modal fade" id="confirmarEliminarActividadModal" tabindex="-1" aria-labelledby="confirmarEliminarActividadModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="confirmarEliminarActividadModalLabel">Eliminar actividad</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    ¿Seguro que quieres eliminar esta actividad?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger" id="confirmar-eliminar-actividad">Eliminar</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script id="activity-catalog-data" type="application/json">{{ activity_catalog | tojson }}</script>

    <script>
        const activityCatalog = JSON.parse(document.getElementById("activity-catalog-data").textContent);
        const modulos = activityCatalog.map((item) => ({ cod: item.cod, nombre: item.nombre }));
        const moduloRaMap = Object.fromEntries(
            activityCatalog.map((item) => [item.cod, item.ras])
        );

        const maxActividades = 8;
        const actividadesContainer = document.getElementById("actividades-container");
        const agregarActividadBtn = document.getElementById("agregar-actividad");
        const confirmarEliminarActividadBtn = document.getElementById("confirmar-eliminar-actividad");
        const confirmarEliminarActividadModal = new bootstrap.Modal(document.getElementById("confirmarEliminarActividadModal"));
        let actividadPendienteEliminar = null;

        function buildModuloOptions(selectedCod) {
            return modulos.map((modulo) => {
                const selected = modulo.cod === selectedCod ? "selected" : "";
                return `<option value="${modulo.cod}" ${selected}>${modulo.nombre} (${modulo.cod})</option>`;
            }).join("");
        }

        function buildRaOptions(moduloCod, selectedRaId = "") {
            const ras = moduloRaMap[moduloCod] || [];
            const baseOption = '<option value="">Selecciona un R.A</option>';
            const options = ras.map((ra) => {
                const selected = String(ra.id) === String(selectedRaId) ? "selected" : "";
                return `<option value="${ra.id}" ${selected}>${ra.codigo} - ${ra.descripcion}</option>`;
            }).join("");
            return baseOption + options;
        }

        function crearFilaActividad(index) {
            const moduloInicial = modulos.length > 0 ? modulos[0].cod : "";
            const fila = document.createElement("div");
            fila.className = "row g-3 border rounded p-3 m-0 w-100";
            fila.dataset.index = index;
            fila.innerHTML = `
                <div class="col-md-6">
                    <label for="actividad_formativa_${index}" class="form-label">Actividad formativa desarrollada</label>
                    <textarea class="form-control" id="actividad_formativa_${index}" name="actividad_formativa_${index}" rows="2" required></textarea>
                </div>
                <div class="col-md-3">
                    <label for="modulo_profesional_${index}" class="form-label">Código módulo profesional</label>
                    <select class="form-select modulo-select" id="modulo_profesional_${index}" name="modulo_profesional_${index}" required>
                        ${buildModuloOptions(moduloInicial)}
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="ra_${index}" class="form-label">R.A</label>
                    <select class="form-select ra-select" id="ra_${index}" name="ra_${index}" required>
                        ${buildRaOptions(moduloInicial)}
                    </select>
                </div>
                <div class="col-12 d-flex justify-content-end">
                    <button type="button" class="btn btn-outline-danger btn-sm eliminar-actividad">Eliminar actividad</button>
                </div>
            `;

            const moduloSelect = fila.querySelector(".modulo-select");
            const raSelect = fila.querySelector(".ra-select");
            moduloSelect.addEventListener("change", (event) => {
                raSelect.innerHTML = buildRaOptions(event.target.value);
            });

            const eliminarBtn = fila.querySelector(".eliminar-actividad");
            eliminarBtn.addEventListener("click", () => {
                if (actividadesContainer.children.length <= 1) {
                    return;
                }
                actividadPendienteEliminar = fila;
                confirmarEliminarActividadModal.show();
            });

            return fila;
        }

        function reindexarActividades() {
            Array.from(actividadesContainer.children).forEach((fila, i) => {
                const index = i + 1;
                fila.dataset.index = index;

                const actividadLabel = fila.querySelector("label[for^='actividad_formativa_']");
                const actividadInput = fila.querySelector("textarea[id^='actividad_formativa_']");
                if (actividadLabel && actividadInput) {
                    actividadLabel.setAttribute("for", `actividad_formativa_${index}`);
                    actividadInput.id = `actividad_formativa_${index}`;
                    actividadInput.name = `actividad_formativa_${index}`;
                }

                const moduloLabel = fila.querySelector("label[for^='modulo_profesional_']");
                const moduloSelect = fila.querySelector("select[id^='modulo_profesional_']");
                if (moduloLabel && moduloSelect) {
                    moduloLabel.setAttribute("for", `modulo_profesional_${index}`);
                    moduloSelect.id = `modulo_profesional_${index}`;
                    moduloSelect.name = `modulo_profesional_${index}`;
                }

                const raLabel = fila.querySelector("label[for^='ra_']");
                const raSelect = fila.querySelector("select[id^='ra_']");
                if (raLabel && raSelect) {
                    raLabel.setAttribute("for", `ra_${index}`);
                    raSelect.id = `ra_${index}`;
                    raSelect.name = `ra_${index}`;
                }
            });
        }

        function actualizarEstadoBotonActividades() {
            const total = actividadesContainer.children.length;
            agregarActividadBtn.disabled = total >= maxActividades;
            const eliminarBtns = actividadesContainer.querySelectorAll(".eliminar-actividad");
            eliminarBtns.forEach((btn) => {
                btn.disabled = total <= 1;
            });
        }

        function agregarActividad() {
            const totalActual = actividadesContainer.children.length;
            if (totalActual >= maxActividades) {
                return;
            }
            const nuevoIndice = totalActual + 1;
            actividadesContainer.appendChild(crearFilaActividad(nuevoIndice));
            reindexarActividades();
            actualizarEstadoBotonActividades();
        }

        agregarActividadBtn.addEventListener("click", agregarActividad);
        agregarActividad();

        confirmarEliminarActividadBtn.addEventListener("click", () => {
            if (!actividadPendienteEliminar) {
                confirmarEliminarActividadModal.hide();
                return;
            }
            actividadPendienteEliminar.remove();
            actividadPendienteEliminar = null;
            reindexarActividades();
            actualizarEstadoBotonActividades();
            confirmarEliminarActividadModal.hide();
        });

        document.getElementById("guardar-constantes").addEventListener("click", async (event) => {
            event.preventDefault();

            const curso_academico = [
                document.getElementById("alumno-curso-inicio").value,
                document.getElementById("alumno-curso-fin").value
            ].join("/");

            const alumno = {
                nombre: document.getElementById("alumno-nombre").value,
                apellidos: document.getElementById("alumno-apellidos").value,
                curso_academico: curso_academico,
                email: document.getElementById("alumno-email").value
            };
            const centro = {
                nombre: document.getElementById("centro-nombre").value,
                nombre_tutor: document.getElementById("centro-nombre-tutor").value,
                apellidos_tutor: document.getElementById("centro-apellidos-tutor").value,
                email_tutor: document.getElementById("tutor-email").value
            };

            const payload = {
                alumno: alumno,
                centro: centro
            };

            console.log("Payload a enviar:", payload);

            try {
                const response = await fetch("/save-constants", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || "Error al guardar datos constantes");
                }

                alert("Datos constantes guardados correctamente");
                document.getElementById("mensaje-exito").textContent = "Datos constantes guardados correctamente";
                document.getElementById("mensaje-exito").classList.add("text-success", "border", "border-success", "p-2");

                setTimeout(() => {
                    document.getElementById("mensaje-exito").textContent = "";
                    document.getElementById("mensaje-exito").classList.remove("text-success", "border", "border-success", "p-2");
                }, 3000);
            } catch (error) {
                console.error(error);
                document.getElementById("mensaje-exito").textContent = "Error al guardar datos constantes";
                document.getElementById("mensaje-exito").classList.add("text-danger", "border", "border-danger", "p-2");
                setTimeout(() => {
                    document.getElementById("mensaje-exito").textContent = "";
                    document.getElementById("mensaje-exito").classList.remove("text-danger", "border", "border-danger", "p-2");
                }, 3000);
            }
        });
    </script>
</body>

</html>
