<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Documentos</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>

    <main class="container mt-5">


        <h1>Generador de Documentos</h1>


        <form id="documento-form" action="/generate" method="post" class="mt-4 mb-5">
            <div class="accordion mb-4" id="datos-constantes-accordion">
                <div class="accordion-item">
                    <h2 class="accordion-header" id="heading-alumno">
                        <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapse-alumno" aria-expanded="true" aria-controls="collapse-alumno">
                            Datos del alumno
                        </button>
                    </h2>
                    <div id="collapse-alumno" class="accordion-collapse collapse show" aria-labelledby="heading-alumno">
                        <div class="accordion-body">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="alumno-nombre" class="form-label">Nombre</label>
                                    <input
                                    type="text"
                                    class="form-control" 
                                    id="alumno-nombre" 
                                    name="alumno_nombre" 
                                    placeholder="Juan" 
                                    required
                                    {% if alumno %} value="{{ alumno.nombre }}" {% endif %}>
                                </div>
                                <div class="col-md-6">
                                    <label for="alumno-apellidos" class="form-label">Apellidos</label>
                                    <input
                                    type="text"
                                    class="form-control"
                                    id="alumno-apellidos"
                                    name="alumno_apellidos"
                                    placeholder="Pérez García"
                                    required
                                    {% if alumno %} value="{{ alumno.apellidos }}" {% endif %}>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Curso académico</label>
                                    <div class="input-group">
                                        <input type="text" class="form-control" id="alumno-curso-inicio" name="alumno_curso_inicio" placeholder="2025" pattern="^\d{4}$" title="Año de inicio (4 dígitos)" inputmode="numeric" required
                                        {% if alumno %} value="{{ alumno.curso_academico.split('/')[0] }}" {% endif %}>
                                        <span class="input-group-text">/</span>
                                        <input type="text" class="form-control" id="alumno-curso-fin" name="alumno_curso_fin" placeholder="2026" pattern="^\d{4}$" title="Año de fin (4 dígitos)" inputmode="numeric" required
                                        {% if alumno %} value="{{ alumno.curso_academico.split('/')[1] }}" {% endif %}>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label for="alumno-email" class="form-label">Email</label>
                                    <input type="email" class="form-control" id="alumno-email" name="alumno_email" placeholder="alumno@correo.com" required
                                    {% if alumno %} value="{{ alumno.email }}" {% endif %}>
                                </div>
                                <div class="col-md-6">
                                    <label for="alumno-num-convenio" class="form-label">Nº del Convenio o Acuerdo de aprendizaje</label>
                                    <input
                                    type="text"
                                    class="form-control"
                                    id="alumno-num-convenio"
                                    name="alumno_num_convenio"
                                    placeholder="123/2025"
                                    {% if alumno %} value="{{ alumno.num_convenio }}" {% endif %}>
                                </div>
                                <div class="col-md-6">
                                    <label for="alumno-num-anexo" class="form-label">Nº del Anexo Relación de alumnos</label>
                                    <input
                                    type="text"
                                    class="form-control"
                                    id="alumno-num-anexo"
                                    name="alumno_num_anexo"
                                    placeholder="A-001"
                                    {% if alumno %} value="{{ alumno.num_anexo }}" {% endif %}>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="accordion-item">
                    <h2 class="accordion-header" id="heading-centro">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapse-centro" aria-expanded="false" aria-controls="collapse-centro">
                            Datos del centro
                        </button>
                    </h2>
                    <div id="collapse-centro" class="accordion-collapse collapse" aria-labelledby="heading-centro">
                        <div class="accordion-body">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="centro-nombre" class="form-label">Nombre del centro</label>
                                    <input type="text" class="form-control" id="centro-nombre" name="centro_nombre" placeholder="IES Ejemplo" required {% if centro %} value="{{ centro.nombre }}" {% endif %}>
                                </div>
                                <div class="col-md-6">
                                    <label for="centro-nombre-tutor" class="form-label">Nombre del tutor</label>
                                    <input type="text" class="form-control" id="centro-nombre-tutor" name="centro_nombre_tutor" placeholder="María" required {% if centro %} value="{{ centro.nombre_tutor }}" {% endif %}>
                                </div>
                                <div class="col-md-6">
                                    <label for="centro-apellidos-tutor" class="form-label">Apellidos del tutor</label>
                                    <input type="text" class="form-control" id="centro-apellidos-tutor" name="centro_apellidos_tutor" placeholder="López Martínez" required {% if centro %} value="{{ centro.apellidos_tutor }}" {% endif %}>
                                </div>
                                <div class="col-md-6">
                                    <label for="tutor-email" class="form-label">Email</label>
                                    <input type="email" class="form-control" id="tutor-email" name="tutor_email" placeholder="tutor@correo.com" required {% if centro %} value="{{ centro.email_tutor }}" {% endif %}>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-12">
                        <p id="mensaje-exito" class="text-success mb-0"></p>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h2 class="h5 mb-0">Actividades</h2>
                    <button type="button" id="agregar-actividad" class="btn btn-outline-primary btn-sm">Añadir actividad</button>
                </div>
                <div class="card-body">
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label for="periodo-seguimiento-inicio" class="form-label">Periodo de seguimiento - fecha de comienzo</label>
                            <input type="date" class="form-control" id="periodo-seguimiento-inicio" name="periodo_seguimiento_inicio" required>
                        </div>
                        <div class="col-md-6">
                            <label for="periodo-seguimiento-fin" class="form-label">Periodo de seguimiento - fecha de fin</label>
                            <input type="date" class="form-control" id="periodo-seguimiento-fin" name="periodo_seguimiento_fin" required>
                        </div>
                    </div>
                    <div id="actividades-container" class="d-grid gap-3"></div>
                    <small class="text-muted">Máximo 8 actividades.</small>
                </div>
            </div>




            <button type="submit" id="generar-documento" class="btn btn-primary">Generar documento</button>
        </form>



    </main>
    <div class="modal fade" id="confirmarEliminarActividadModal" tabindex="-1" aria-labelledby="confirmarEliminarActividadModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="confirmarEliminarActividadModalLabel">Eliminar actividad</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    ¿Seguro que quieres eliminar esta actividad?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger" id="confirmar-eliminar-actividad">Eliminar</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script id="activity-catalog-data" type="application/json">{{ activity_catalog | tojson }}</script>


    <script src="/static/js/main.js"></script>

</body>

</html>
